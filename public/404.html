<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS2 Tools - Redirecting...</title>
  <script>
    // Redirect all 404 requests to index.html for client-side routing
    const path = window.location.pathname.replace(/^\/cs2-tools/, '');
    const search = window.location.search;
    window.location.href = '/cs2-tools/index.html' + search + (path ? '#' + path : '');
  </script>
</head>
<body>
  <p>Redirecting to CS2 Tools...</p>
</body>
</html>
